<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Housing Sim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── ログイン画面 ── */
    #login-screen {
      background: #fff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    #login-screen h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #1a1a2e;
    }
    #login-screen p {
      color: #666;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }
    #password-input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #password-input:focus { border-color: #4a6cf7; }
    #login-btn {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1rem;
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-btn:hover { background: #3a5ce5; }
    #error-msg {
      color: #e53e3e;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      display: none;
    }

    /* ── コンテンツ画面 ── */
    #app-content {
      display: none;
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div id="login-screen">
    <h1>Housing Sim</h1>
    <p>閲覧にはパスワードが必要です</p>
    <input type="password" id="password-input" placeholder="パスワードを入力" autocomplete="off">
    <button id="login-btn">ログイン</button>
    <p id="error-msg">パスワードが正しくありません</p>
  </div>

  <!-- 認証後コンテンツ（暗号化データから復号） -->
  <div id="app-content"></div>

    const loginScreen = document.getElementById('login-screen');
    const appContent = document.getElementById('app-content');
    const passwordInput = document.getElementById('password-input');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');

    function tryDecrypt(password) {
      try {
        const bytes = CryptoJS.AES.decrypt(ENCRYPTED_CONTENT, password);
        const decrypted = bytes.toString(CryptoJS.enc.Utf8);
        if (decrypted && decrypted.length > 0) {
          return decrypted;
        }
        return null;
      } catch {
        return null;
      }
    }

    function handleLogin() {
      const password = passwordInput.value;
      if (!password) return;

      const content = tryDecrypt(password);
      if (content) {
        loginScreen.style.display = 'none';
        appContent.style.display = 'block';
        appContent.innerHTML = content;
        document.body.style.display = 'block';
        document.body.style.background = '#fff';
      } else {
        errorMsg.style.display = 'block';
        passwordInput.value = '';
        passwordInput.focus();
      }
    }

    loginBtn.addEventListener('click', handleLogin);
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
      errorMsg.style.display = 'none';
    });

    passwordInput.focus();
  </script>
</body>
</html>
