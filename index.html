<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D6B4E">
<title>住宅手当シミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F5F3EE;--surface:#FFFFFF;--surface2:#F7F5F0;
  --border:rgba(0,0,0,0.07);--border-strong:rgba(0,0,0,0.14);
  --text:#1A1916;--muted:#6B6860;--hint:#A09D97;
  --accent:#1D6B4E;--accent-bg:#E1F5EE;--accent-dk:#0F4A36;--accent-light:#2D8B66;
  --warn:#8B3A1E;--warn-bg:#FAECE7;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.07),0 1px 3px rgba(0,0,0,0.04);
  --sans:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--rl:16px;
}
html{font-size:16px;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;-webkit-text-size-adjust:100%;}

/* LOCK */
#lock{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:linear-gradient(160deg,var(--bg) 0%,#EBE8E1 100%);}
.lock-wrap{background:var(--surface);border:0.5px solid var(--border-strong);border-radius:20px;padding:2.5rem 1.75rem;width:100%;max-width:380px;text-align:center;box-shadow:var(--shadow-md);}
.lock-ico{width:56px;height:56px;background:var(--accent-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.lock-ico svg{width:26px;height:26px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.lock-h{font-size:18px;font-weight:700;margin-bottom:6px;letter-spacing:-0.01em;}
.lock-sub{font-size:13px;color:var(--muted);margin-bottom:1.75rem;line-height:1.5;}
.pw-inp{width:100%;padding:14px 16px;font-size:16px;font-family:var(--mono);border:1.5px solid var(--border-strong);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none;letter-spacing:.08em;margin-bottom:12px;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s;}
.pw-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,107,78,0.1);}
.pw-inp.err{border-color:var(--warn);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.pw-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-family:var(--sans);font-weight:600;cursor:pointer;-webkit-appearance:none;transition:background .15s,transform .1s;}
.pw-btn:active{background:var(--accent-dk);transform:scale(0.98);}
.pw-err{font-size:12px;color:var(--warn);margin-top:8px;min-height:16px;}

/* APP */
#app{display:none;}
.hdr{background:var(--surface);border-bottom:0.5px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.125rem;position:sticky;top:0;z-index:100;box-shadow:0 1px 2px rgba(0,0,0,0.04);}
.hdr-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;letter-spacing:-0.01em;}
.hdr-badge{font-size:10px;background:var(--accent-bg);color:var(--accent-dk);padding:2px 8px;border-radius:20px;font-weight:500;}
.hdr-lock{font-size:12px;color:var(--muted);border:1px solid var(--border-strong);background:transparent;padding:6px 12px;border-radius:var(--r);font-family:var(--sans);cursor:pointer;transition:background .15s;}
.hdr-lock:active{background:var(--surface2);}

/* SCROLL */
.scr{padding:1rem 1rem calc(env(safe-area-inset-bottom,0px) + 76px);}

/* CARD */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.125rem;margin-bottom:1rem;box-shadow:var(--shadow);}
.card-h{font-size:14px;font-weight:600;color:var(--text);margin-bottom:1rem;letter-spacing:-0.01em;}

/* SLIDERS */
.slg{margin-bottom:.5rem;}
.slh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.sl-lbl{font-size:13px;color:var(--muted);font-weight:400;}
.sl-val{font-size:16px;font-weight:600;font-family:var(--mono);color:var(--accent-dk);}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;background:var(--border-strong);border-radius:3px;outline:none;cursor:pointer;margin-bottom:1rem;touch-action:manipulation;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2),0 0 0 1px var(--accent);transition:transform .15s;}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.15);}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.2);}

/* METRICS */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;}
.mc{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem;box-shadow:var(--shadow);}
.mc-lbl{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:6px;font-weight:500;}
.mc-val{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1.1;letter-spacing:-0.02em;}
.mc-val.pos{color:var(--accent);}
.mc-val.neg{color:var(--warn);}
.mc-sub{font-size:10px;color:var(--hint);margin-top:4px;}

/* BREAKDOWN */
.brow{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:13px;gap:8px;}
.brow:last-child{border-bottom:none;}
.bk{color:var(--muted);flex:1;line-height:1.4;}
.bv{font-family:var(--mono);font-weight:500;white-space:nowrap;text-align:right;}
.bv.pos{color:var(--accent);}
.bv.neg{color:var(--warn);}

/* WARN CARD */
.wcard{background:var(--warn-bg);border:0.5px solid rgba(139,58,30,.12);border-radius:var(--rl);padding:1.125rem;margin-bottom:1rem;box-shadow:var(--shadow);}
.wh{font-size:12px;font-weight:600;color:var(--warn);margin-bottom:.5rem;}
.wb{font-size:12.5px;color:var(--warn);line-height:1.8;}
.wb strong{color:var(--warn);font-weight:600;}

/* TABLE */
.tbl-cards{display:flex;flex-direction:column;gap:.875rem;}
.tbl-card{background:var(--surface2);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.tbl-card-h{font-size:13px;font-weight:600;color:var(--text);padding:.75rem 1rem;background:var(--surface);border-bottom:0.5px solid var(--border);}
.tbl-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;}
.tbl-cell{padding:.75rem;border-bottom:0.5px solid var(--border);border-right:0.5px solid var(--border);}
.tbl-cell:nth-child(3n){border-right:none;}
.tbl-cell:nth-last-child(-n+3){border-bottom:none;}
.tbl-rent{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:500;}
.tbl-val{font-size:14px;font-weight:600;font-family:var(--mono);}
.tp{color:var(--accent);}
.tn{color:var(--warn);}

/* DETAIL */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:.875rem;margin-bottom:1rem;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;margin-left:5px;}
.bg{background:var(--accent-bg);color:var(--accent-dk);}
.br{background:var(--warn-bg);color:var(--warn);}
.note{font-size:11px;color:var(--hint);margin-top:10px;line-height:1.7;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);z-index:100;box-shadow:0 -1px 4px rgba(0,0,0,0.04);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;gap:4px;font-size:10px;color:var(--muted);background:transparent;border:none;cursor:pointer;font-family:var(--sans);-webkit-tap-highlight-color:transparent;transition:color .15s;position:relative;font-weight:500;}
.nb svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.5;transition:transform .15s;}
.nb.active{color:var(--accent);}
.nb.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2.5px;background:var(--accent);border-radius:0 0 2px 2px;}
.nb.active svg{transform:scale(1.08);}

/* PANELS */
.panel{display:none;}
.panel.on{display:block;animation:pi .25s ease both;}
@keyframes pi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* PC */
@media(min-width:640px){
  .scr{max-width:640px;margin:0 auto;}
  .mg{grid-template-columns:repeat(4,1fr);}
  .tbl-grid{grid-template-columns:repeat(6,1fr);}
  .tbl-cell:nth-child(3n){border-right:0.5px solid var(--border);}
  .tbl-cell:nth-child(6n){border-right:none;}
  .tbl-cell:nth-last-child(-n+3){border-bottom:0.5px solid var(--border);}
  .tbl-cell:nth-last-child(-n+6){border-bottom:none;}
  .pw-btn:hover{background:var(--accent-dk);}
  .hdr-lock:hover{background:var(--surface2);}
  .nb:hover{color:var(--accent-dk);}
}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="lock-wrap">
    <div class="lock-ico">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>

</div>

  function tryDecrypt(password) {
    try {
      const bytes = CryptoJS.AES.decrypt(ENCRYPTED_CONTENT, password);
      const decrypted = bytes.toString(CryptoJS.enc.Utf8);
      if (decrypted && decrypted.length > 0) return decrypted;
      return null;
    } catch { return null; }
  }

  function activateScripts(container) {
    container.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
  }

  function showApp(content, pw) {
    document.getElementById('lock').style.display = 'none';
    const app = document.getElementById('app');
    app.style.display = 'block';
    app.innerHTML = content;
    activateScripts(app);
    sessionStorage.setItem('_k', pw);
  }

  function unlock() {
    const v = document.getElementById('pw').value;
    if (!v) return;
    const content = tryDecrypt(v);
    if (content) {
      showApp(content, v);
    } else {
      document.getElementById('pw-err').textContent = 'パスワードが正しくありません';
      const inp = document.getElementById('pw');
      inp.classList.add('err');
      setTimeout(() => inp.classList.remove('err'), 350);
    }
  }

  function lockout() {
    document.getElementById('lock').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('app').innerHTML = '';
    document.getElementById('pw').value = '';
    document.getElementById('pw-err').textContent = '';
    sessionStorage.removeItem('_k');
  }

  // リロード時に自動復号
  (function() {
    const saved = sessionStorage.getItem('_k');
    if (saved) {
      const content = tryDecrypt(saved);
      if (content) { showApp(content, saved); return; }
      sessionStorage.removeItem('_k');
    }
    document.getElementById('pw').focus();
  })();
</script>
